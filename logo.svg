<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <defs>
    <linearGradient id="gMark" x1="0" y1="0" x2="48" y2="48">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="gDot" x1="0" y1="0" x2="12" y2="12">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Logo mark: abstract neural/connection symbol inside rounded shape -->
  <rect x="2" y="6" width="48" height="48" rx="14" fill="url(#gMark)"/>

  <!-- Stylized "O" made of connected nodes — represents network/AI -->
  <!-- Outer ring of nodes -->
  <circle cx="26" cy="18" r="3" fill="#fff"/>
  <circle cx="36" cy="24" r="3" fill="#fff"/>
  <circle cx="36" cy="36" r="3" fill="#fff"/>
  <circle cx="26" cy="42" r="3" fill="#fff"/>
  <circle cx="16" cy="36" r="3" fill="#fff"/>
  <circle cx="16" cy="24" r="3" fill="#fff"/>

  <!-- Central node -->
  <circle cx="26" cy="30" r="3.5" fill="#fff"/>

  <!-- Connections from center to outer nodes -->
  <line x1="26" y1="30" x2="26" y2="18" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <line x1="26" y1="30" x2="36" y2="24" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <line x1="26" y1="30" x2="36" y2="36" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <line x1="26" y1="30" x2="26" y2="42" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <line x1="26" y1="30" x2="16" y2="36" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <line x1="26" y1="30" x2="16" y2="24" stroke="#fff" stroke-width="1.5" opacity="0.5"/>

  <!-- Outer ring connections -->
  <line x1="26" y1="18" x2="36" y2="24" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
  <line x1="36" y1="24" x2="36" y2="36" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
  <line x1="36" y1="36" x2="26" y2="42" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
  <line x1="26" y1="42" x2="16" y2="36" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
  <line x1="16" y1="36" x2="16" y2="24" stroke="#fff" stroke-width="1.2" opacity="0.35"/>
  <line x1="16" y1="24" x2="26" y2="18" stroke="#fff" stroke-width="1.2" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="62" y="43" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="36" fill="#1a1207" letter-spacing="-1">
    <tspan>Oz</tspan><tspan fill="url(#gMark)">AI</tspan>
  </text>
</svg>
