  </defs>
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- Neural O: 6 outer nodes + 1 center, connected -->
  <circle cx="16" cy="8" r="2.2" fill="#fff"/>
  <circle cx="23" cy="12" r="2.2" fill="#fff"/>
  <circle cx="23" cy="20" r="2.2" fill="#fff"/>
