  <line x1="16" y1="16" x2="16" y2="8" stroke="#fff" stroke-width="1.2" opacity="0.45"/>
  <line x1="16" y1="16" x2="23" y2="12" stroke="#fff" stroke-width="1.2" opacity="0.45"/>
  <line x1="16" y1="16" x2="23" y2="20" stroke="#fff" stroke-width="1.2" opacity="0.45"/>
  <line x1="16" y1="16" x2="16" y2="24" stroke="#fff" stroke-width="1.2" opacity="0.45"/>
