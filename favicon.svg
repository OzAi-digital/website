  <line x1="23" y1="12" x2="23" y2="20" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="23" y1="20" x2="16" y2="24" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="16" y1="24" x2="9" y2="20" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="9" y1="20" x2="9" y2="12" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="9" y1="12" x2="16" y2="8" stroke="#fff" stroke-width="1" opacity="0.3"/>
